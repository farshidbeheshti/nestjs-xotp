name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  smoke:
    name: Dist smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:smoke

  consumer:
    name: Consumer smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:smoke:consumer

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    needs: [test, smoke, consumer]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.smoke.result }}" != "success" ] || \
             [ "${{ needs.consumer.result }}" != "success" ]; then
            echo "One or more required checks failed or were cancelled."
            exit 1
          fi
